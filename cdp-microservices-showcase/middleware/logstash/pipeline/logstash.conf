input {
  beats {
    port => 5044
  }
}

filter {
  if [message] =~ "^[{\\[].*[}\\]]$" {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "cdp-logs-%{+YYYY.MM.dd}"
  }
  stdout {
    codec => rubydebug
  }
}

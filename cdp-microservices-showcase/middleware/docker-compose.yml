services:
  mysql:
    image: mysql:8.0.39
    container_name: cdp-demo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cdp_demo
      TZ: Asia/Shanghai
    command: ["--default-authentication-plugin=mysql_native_password"]
    ports:
      - "3306:3306"
    volumes:
      - ../runtime-data/mysql/data:/var/lib/mysql

  redis:
    image: redis:7.2
    container_name: cdp-demo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ../runtime-data/redis/data:/data

  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: cdp-demo-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      JVM_XMS: 256m
      JVM_XMX: 256m
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: "false"
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ../runtime-data/nacos/data:/home/nacos/data
      - ../runtime-data/nacos/logs:/home/nacos/logs

  kafka:
    image: bitnami/kafka:3.9
    container_name: cdp-demo-kafka
    restart: unless-stopped
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_KRAFT_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    volumes:
      - ../runtime-data/kafka/data:/bitnami/kafka

  skywalking-oap:
    image: apache/skywalking-oap-server:10.1.0
    container_name: cdp-demo-skywalking-oap
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      SW_STORAGE: h2
    ports:
      - "11800:11800"
      - "12800:12800"
    volumes:
      - ../runtime-data/skywalking/oap:/skywalking/oap/data

  skywalking-ui:
    image: apache/skywalking-ui:10.1.0
    container_name: cdp-demo-skywalking-ui
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
      SW_ZIPKIN_ADDRESS: http://skywalking-oap:9412
    depends_on:
      - skywalking-oap
    ports:
      - "18080:8080"

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.100.0
    container_name: cdp-demo-otel-collector
    restart: unless-stopped
    profiles: ["observability"]
    command: ["--config=/etc/otelcol/config.yaml"]
    depends_on:
      - skywalking-oap
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: cdp-demo-elasticsearch
    restart: unless-stopped
    profiles: ["observability"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - ../runtime-data/elasticsearch/data:/usr/share/elasticsearch/data

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: cdp-demo-kibana
    restart: unless-stopped
    profiles: ["observability"]
    depends_on:
      - elasticsearch
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"

  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.3
    container_name: cdp-demo-logstash
    restart: unless-stopped
    profiles: ["observability"]
    depends_on:
      - elasticsearch
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./logstash/pipeline/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ../runtime-data/logstash/data:/usr/share/logstash/data

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.3
    container_name: cdp-demo-filebeat
    restart: unless-stopped
    profiles: ["observability"]
    depends_on:
      - logstash
    user: root
    command: ["--strict.perms=false"]
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ../runtime-data/filebeat/data:/usr/share/filebeat/data
      - ../:/workspace/showcase:ro

  dozzle:
    image: amir20/dozzle:v8.12.9
    container_name: cdp-demo-dozzle
    restart: unless-stopped
    profiles: ["observability"]
    ports:
      - "19999:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
